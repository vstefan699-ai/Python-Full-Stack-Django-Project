<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FitTrack Pro{% endblock %}</title>
    <!-- Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background-color: #1a1a1a;
            border-bottom: 2px solid #e63946;
        }
        .navbar-brand {
            color: #e63946 !important;
            font-weight: 700;
            font-size: 1.5rem;
        }
        .nav-username {
            color: #ffffff !important;
        }
        .btn-danger {
            background-color: #e63946;
            border: none;
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: #ffffff;
        }
        .card:hover {
            border-color: #e63946;
            transition: 0.3s;
        }
        .sidebar {
            background-color: #1a1a1a;
            min-height: 100vh;
            border-right: 2px solid #2a2a2a;
        }
        .sidebar a {
            color: #ffffff;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 0;
        }
        .sidebar a:hover {
            background-color: #e63946;
            color: #ffffff;
        }
        .sidebar .menu-label {
            color: #aaaaaa;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            padding: 0 20px;
            margin-top: 8px;
        }
        .sidebar a.active {
            background-color: #e63946;
            color: #ffffff;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border-left: 4px solid #e63946;
        }
        .stat-card p {
            color: #aaaaaa;
        }
        .stat-card h3 {
            color: #ffffff;
        }
        .text-muted {
            color: #aaaaaa !important;
        }
        .table {
            color: #ffffff;
        }
        .table-dark {
            --bs-table-bg: #1a1a1a;
            --bs-table-striped-bg: #222222;
            --bs-table-hover-bg: #2a2a2a;
            color: #ffffff;
        }
        .form-control, .form-select {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
            border-color: #444444 !important;
        }
        .form-control::placeholder {
            color: #888888 !important;
        }
        .form-label {
            color: #aaaaaa;
        }
        .badge.bg-secondary {
            background-color: #444444 !important;
            color: #ffffff !important;
        }
</style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-dumbbell"></i> FitTrack Pro
            </a>
            {% if user.is_authenticated %}
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="nav-username">
                    <i class="fas fa-user"></i> {{ user.username }}
                    {% if user.is_staff %}
                        <span class="badge bg-danger ms-1">Admin</span>
                    {% endif %}
                </span>
                <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
            {% endif %}
        </div>
    </nav>

    <!-- Flash messages -->
    {% if messages %}
        <div class="container-fluid px-4 pt-3">
            {% for message in messages %}
            <div class="alert d-flex align-items-center gap-2 {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}" 
                 style="background-color: {% if message.tags == 'error' %}#2d0a0a{% else %}#0a2d0a{% endif %}; 
                        border: 1px solid {% if message.tags == 'error' %}#e63946{% else %}#28a745{% endif %}; 
                        color: #ffffff;">
                 <i class="fas {% if message.tags == 'error' %}fa-circle-xmark{% else %}fa-circle-check{% endif %}" 
                    style="color: {% if message.tags == 'error' %}#e63946{% else %}#28a745{% endif %};"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
